<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home</title>
    <style>
        :root {
            /* Replace with any high-res image URL */
            --bg-image: url('https://images.unsplash.com/photo-1477346611705-65d1883cee1e?auto=format&fit=crop&w=1920&q=80');
            --text-color: #ffffff;
            --accent-color: #00d4ff;
            --overlay: rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: linear-gradient(var(--overlay), var(--overlay)), var(--bg-image);
            background-size: cover;
            background-position: center;
            color: var(--text-color);
            overflow: hidden;
            text-align: center;
        }

        #greeting {
            font-size: 1.5rem;
            font-weight: 300;
            margin-bottom: 0.5rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            opacity: 0.9;
        }

        #clock {
            font-size: 6rem;
            font-weight: 200;
            margin-bottom: 2rem;
            text-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        form {
            width: 90%;
            max-width: 500px;
            margin-bottom: 2.5rem;
        }

        input[type="text"] {
            width: 100%;
            padding: 15px 25px;
            border-radius: 50px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            color: white;
            font-size: 1.1rem;
            outline: none;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            text-align: center;
        }

        input[type="text"]:focus {
            background: rgba(255, 255, 255, 0.2);
            width: 110%; /* Slight expansion on focus */
        }

        .links {
            display: flex;
            gap: 30px;
        }

        .links a {
            color: var(--text-color);
            text-decoration: none;
            font-size: 0.85rem;
            letter-spacing: 1px;
            text-transform: uppercase;
            opacity: 0.6;
            transition: 0.3s;
        }

        .links a:hover {
            opacity: 1;
            color: var(--accent-color);
            transform: translateY(-2px);
        }
    </style>
</head>
<body>

    <div id="greeting">Hello</div>
    <div id="clock">00:00</div>

    <form action="https://www.google.com/search" method="get">
        <input type="text" name="q" placeholder="Search" autofocus autocomplete="off">
    </form>

    <div class="links">
        <a href="https://github.com">GitHub</a>
        <a href="https://youtube.com">YouTube</a>
        <a href="https://reddit.com">Reddit</a>
        <a href="https://gmail.com">Mail</a>
    </div>

    <script>
        function updateUI() {
            const now = new Date();
            const hours = now.getHours();
            const mins = String(now.getMinutes()).padStart(2, '0');
            
            // Update Clock
            document.getElementById('clock').textContent = `${hours}:${mins}`;

            // Update Greeting
            let greet = "Good Night";
            if (hours < 12) greet = "Good Morning";
            else if (hours < 18) greet = "Good Afternoon";
            else if (hours < 22) greet = "Good Evening";
            
            document.getElementById('greeting').textContent = greet;
        }

        setInterval(updateUI, 1000);
        updateUI();
    </script>

</body>
</html>
